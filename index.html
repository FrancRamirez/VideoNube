<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudVideo</title>

  <!-- Fuentes de Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Reproductor Plyr.js (CSS) -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">Cloud<span>Video</span></div>
      <div class="search-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="buscador" placeholder="Buscar película..." aria-label="Buscar película" />
      </div>
      <div class="drive-badge">
        <img src="assets/icon_drive.png" alt="Google Drive" width="24" height="24" />
        Google Drive
      </div>
    </div>
  </header>

  <!-- ===== CONTENIDO PRINCIPAL ===== -->
  <main class="site-main">

    <!-- Estado: cargando -->
    <div id="estado-cargando" class="estado-mensaje">
      <div class="spinner" aria-label="Cargando..."></div>
      <p>Cargando tu colección...</p>
    </div>

    <!-- Estado: sin archivos -->
    <div id="estado-vacio" class="estado-mensaje oculto">
      <p>No se encontraron películas en la carpeta.</p>
    </div>

    <!-- Estado: error -->
    <div id="estado-error" class="estado-mensaje oculto">
      <p id="texto-error">Ocurrió un error al cargar los archivos.</p>
    </div>

    <!-- Grid de películas (se llena dinámicamente con JS) -->
    <section id="coleccion" class="coleccion oculto">
      <h2 class="seccion-titulo">Tu colección</h2>
      <div id="grid-peliculas" class="grid-peliculas"></div>
    </section>

  </main>

  <!-- ===== MODAL DEL REPRODUCTOR ===== -->
  <div id="modal-reproductor" class="modal oculto" role="dialog" aria-modal="true" aria-label="Reproductor CloudVideo">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-contenido">
      <div class="modal-header">
        <h3 id="modal-titulo" class="modal-titulo">Título de la película</h3>
        <button id="modal-cerrar" class="modal-cerrar" aria-label="Cerrar reproductor">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" aria-hidden="true">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <!-- Plyr reemplaza este elemento con el reproductor completo -->
      <video id="reproductor" playsinline controls>
        <source id="video-src" src="" type="video/mp4" />
        Tu navegador no soporta la reproducción de video.
      </video>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-texto">Creado por <span>Francisco</span></p>
    </div>
  </footer>

  <!-- Plyr.js (reproductor) -->
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

  <!-- Lógica principal -->
  <script src="js/script.js"></script>

</body>
</html>
